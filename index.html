<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Talisman Online Rebirth</title>
    <style>
        body {
            margin: 0;
            font-family: 'Arial', sans-serif;
            background: url('background.jpg') no-repeat center center fixed;
            background-size: cover;
            color: white;
        }
        header {
            padding: 20px;
            background-color: rgba(0, 0, 0, 0.7);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        header nav a {
            color: white;
            text-decoration: none;
            padding: 15px;
        }
        .hero {
            text-align: center;
            margin-top: 100px;
        }
        .hero h1 {
            font-size: 50px;
            margin-bottom: 20px;
        }
        .download-btn {
            background-color: #ffcc00;
            padding: 15px 30px;
            font-size: 20px;
            border: none;
            cursor: pointer;
            color: black;
            text-decoration: none;
            transition: background-color 0.3s;
        }
        .download-btn:hover {
            background-color: #e6b800;
        }
        .news {
            margin-top: 40px;
            max-width: 600px;
            margin-left: auto;
            margin-right: auto;
        }
        .news h2 {
            text-align: center;
            font-size: 30px;
        }
        .news-item {
            padding: 15px;
            background-color: rgba(0, 0, 0, 0.7);
            margin: 15px 0;
            border-radius: 5px;
        }
    </style>
</head>
<body>
    <header>
        <h1>Talisman Online Rebirth</h1>
        <nav>
            <a href="#">Home</a>
            <a href="#">Games</a>
            <a href="#">News</a>
            <a href="#">Contact</a>
        </nav>
    </header>
    <div class="hero">
        <h1>Welcome to Talisman Online Rebirth</h1>
        <a href="#" class="download-btn">Download Now</a>
    </div>
    <div class="news">
        <h2>Latest News</h2>
        <div class="news-item">New update available! Check out the new features.</div>
        <div class="news-item">Join our community events this weekend!</div>
        <div class="news-item">Stay tuned for upcoming game releases.</div>
    </div>
</body>
</html>
