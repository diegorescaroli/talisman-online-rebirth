<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Talisman Online Rebirth</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>Talisman Online Rebirth</h1>
        <nav>
            <ul>
                <li><a href="#hero">Home</a></li>
                <li><a href="#news">News</a></li>
                <li><a href="#footer">Contact</a></li>
            </ul>
        </nav>
    </header>

    <section id="hero">
        <h2>Welcome to the World of Talisman</h2>
        <p>Your adventure begins here!</p>
        <button>Play Now</button>
    </section>

    <section id="news">
        <h2>Latest News</h2>
        <div class="tabs">
            <button class="tablink active" onclick="openTab(event, 'updates')">Updates</button>
            <button class="tablink" onclick="openTab(event, 'events')">Events</button>
        </div>
        <div id="updates" class="tabcontent active">
            <h3>Game Updates</h3>
            <p>Check out the latest changes and improvements!</p>
        </div>
        <div id="events" class="tabcontent">
            <h3>Events</h3>
            <p>Don't miss our exciting in-game events!</p>
        </div>
    </section>

    <footer id="footer">
        <p>&copy; 2026 Talisman Online Rebirth. All rights reserved.</p>
    </footer>

    <script>
        function openTab(evt, tabName) {
            var i, tabcontent, tablinks;
            tabcontent = document.getElementsByClassName("tabcontent");
            for (i = 0; i < tabcontent.length; i++) {
                tabcontent[i].style.display = "none";
            }
            tablinks = document.getElementsByClassName("tablink");
            for (i = 0; i < tablinks.length; i++) {
                tablinks[i].className = tablinks[i].className.replace(" active", "");
            }
            document.getElementById(tabName).style.display = "block";
            evt.currentTarget.className += " active";
        }
    </script>
</body>
</html>
